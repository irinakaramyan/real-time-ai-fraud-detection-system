<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time AI Fraud Detection</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1e293b;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 28px;
    }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #64748b;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 14px;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      min-height: 90px;
    }

    .result-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-top: 8px;
    }

    .approve {
      background: #dcfce7;
      color: #166534;
    }

    .review {
      background: #fef3c7;
      color: #92400e;
    }

    .block {
      background: #fee2e2;
      color: #991b1b;
    }

    .error {
      color: #dc2626;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">AI Fraud Detection</div>
    <div class="subtitle">Real-time transaction risk evaluation demo</div>

    <label for="amount">Transaction Amount</label>
    <input type="number" id="amount" placeholder="Enter amount" />

    <label for="country">Country</label>
    <input type="text" id="country" placeholder="Enter country" />

    <label for="device">New Device</label>
    <select id="device">
      <option value="false">No</option>
      <option value="true">Yes</option>
    </select>

    <button onclick="checkFraud()">Analyze Transaction</button>

    <div class="result" id="result">
      <div class="result-title">Detection Result</div>
      <div>Risk score and decision will appear here.</div>
    </div>

    <div class="footer">Prototype Version 1.0</div>
  </div>

  <script>
    async function checkFraud() {
      const amount = parseFloat(document.getElementById("amount").value);
      const country = document.getElementById("country").value.trim();
      const is_new_device = document.getElementById("device").value === "true";
      const resultBox = document.getElementById("result");

      if (!amount || !country) {
        resultBox.innerHTML = `
          <div class="result-title">Detection Result</div>
          <div class="error">Please fill in all fields.</div>
        `;
        return;
      }

      resultBox.innerHTML = `
        <div class="result-title">Detection Result</div>
        <div>Analyzing transaction...</div>
      `;

      try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            amount: amount,
            country: country,
            is_new_device: is_new_device
          })
        });

        const data = await response.json();

        let badgeClass = "";
        if (data.decision === "APPROVE") {
          badgeClass = "approve";
        } else if (data.decision === "REVIEW") {
          badgeClass = "review";
        } else {
          badgeClass = "block";
        }

        resultBox.innerHTML = `
          <div class="result-title">Detection Result</div>
          <div><strong>Risk Score:</strong> ${data.risk_score}</div>
          <div style="margin-top: 8px;">
            <strong>Decision:</strong>
            <span class="badge ${badgeClass}">${data.decision}</span>
          </div>
        `;
      } catch (error) {
        resultBox.innerHTML = `
          <div class="result-title">Detection Result</div>
          <div class="error">Error connecting to backend.</div>
        `;
      }
    }
  </script>
</body>
</html>
